# Solutions de l'exercice de la sÃĐance 1
Ordonner un vecteur `X` composÃĐ de 5 lettres de Scrabble
.pull-left[
## Solution 1: Bubble sorting
```
WHILE is.sort = FALSE
  is.sort = TRUE
  FOR pos IN 1:4
    IF X[pos] &gt; X[pos+1]
      INVERSE
      is.sort = FALSE
    END IF
  END FOR
END WHILE  
```
]
.pull-right[
## Solution 2: Stupid ranking
```
WHILE is.sort = FALSE
  is.sort = TRUE
  MELANGE X
  FOR pos IN 1:4
    IF X[pos] &gt; X[pos+1]
      is.sort = FALSE
    END IF
  END FOR
END WHILE  
```
]

La syntaxe pour ÃĐcrire une `matrice` ou un `data.frame` est aussi simple que pour lire un fichier `CSV`.


``` r

# Ãcrire des fichiers `.Rdata` avec `save()`

Parfois les objets que l'on souhaite enregistrer ont une structure plus complexe qu'un tableau de donnÃĐes. R permet d'enregistrer ces objets dans un format qui lui est unique, le `.Rdata`. Ces objets sont compressÃĐs pour minimiser l'espace disque et ne peuvent ÃŠtre lus uniquement par R.


``` r
MaListe &lt;- list()
MaListe[[1]] &lt;- 1
MaListe[[2]] &lt;- c(1:10)
save(MaListe, file = "MaListe.Rdata")
```

**NOTE** - `save()` permet ÃĐgalement de sauvegarder plusieurs objets.


``` r
save(MaListe,MonDataFrame, file = "MaListe.Rdata")
```

# Sous-ÃĐchantillonner des objets

Parfois, on souhaite avoir seulement une partie des donnÃĐes contenues dans un objet. La fonction `subset()` est fort pratique pour rÃĐaliser cette opÃĐration.

Ici par exemple, dans l'exemple de Sutton, on souhaite ÃĐtudier seulement les quadrats possÃĐdant des ÃĐrables Ã  sucre de plus de 200 mm:


``` r
arbres &lt;- read.table(file="donnees/arbres.csv", header=TRUE, stringsAsFactors=FALSE, sep = ";")
sub_quadrats &lt;- subset(arbres, arbres$esp == "acsa" &amp; arbres$dhp &gt;= 200)
head(sub_quadrats, n=2)
```

```
##    id_bor borx bory arbre  esp multi mort dhp
## 14    0-0    0    0 34516 acsa  FAUX FAUX 371
## 22    0-0    0    0 34524 acsa  FAUX FAUX 388
```

Le "==" est utilisÃĐ pour sÃĐlectionner les individus qui sont des acsa et le symbole "&amp;" pour combiner deux conditions.
